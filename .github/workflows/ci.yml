name: Unit Test Generator

on:
  workflow_dispatch:
  push:
    branches:
      - github_action
      - master
      - dev

jobs:
  generate-tests:
    runs-on: self-hosted

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Python
        run: python --version

      - name: Verify Java
        run: java -version

      - name: Verify Maven
        run: mvn -version

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Test Generator
        run: |
          python llm_coverage_demo.py `
            --repo "D:\hagar\33Java-Project-Dataset\01Max" `
            --mode method `
            --analysis-mode ast `
            --max-targets 150

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-output
          path: demo_out/**